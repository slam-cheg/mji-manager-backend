# Deploy MJI Manager (backend + frontend) to Windows Server via SSH + docker compose.
# Pattern: AutoPZV deploy.yml — zip sources, SCP to server :2222, build on server.
#
# Shared secrets (corporate-app / archive):
#   HOST, USERNAME, SSH_KEY
# MJI Manager secrets:
#   TARGET_PATH          — e.g. C:/Users/AdministratorOffice/sites/mji-manager
#   PUBLIC_URL           — https://mjimanager.ru
#   DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
#   JWT_SECRET
#   OAUTH_REDIRECT_URIS  — comma-separated ExpertHub callback URLs
#   CORS_ORIGINS         — comma-separated origins (include PUBLIC_URL)
#   EXPERT_HUB_SSO_URL, EXPERT_HUB_SSO_CLIENT_ID, EXPERT_HUB_SSO_CLIENT_SECRET
# Optional:
#   FRONTEND_REPOSITORY  — default: <owner>/mji-manager-frontend
#   REPO_ACCESS_TOKEN    — PAT to checkout mji-manager-frontend (if GITHUB_TOKEN cannot)
#   INSTALLER_HOST_PATH, INSTALLER_RELEASES_HOST_PATH
#   WEB_PUBLISH_PORT     — default 2020
#   BACKEND_PUBLISH_PORT — default 2010
#   WINDOWS_HOST_IP      — IPv4 override for frontend→backend routing on Windows NAT
#   API_URL              — override frontend build-time API_URL (default auto from host IP)
#   NEXT_PUBLIC_EXPERT_HUB_SSO_URL, NEXT_PUBLIC_EXPERT_HUB_SSO_CLIENT_ID

name: Deploy MJI Manager (Windows)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INSTALLER_MOUNT: ${{ secrets.INSTALLER_HOST_PATH || 'E:/mji-data/installer' }}
      INSTALLER_RELEASES_MOUNT: ${{ secrets.INSTALLER_RELEASES_HOST_PATH || 'C:/Users/AdministratorOffice/sites/mji-installers' }}
      WEB_PORT: ${{ secrets.WEB_PUBLISH_PORT || '2020' }}
      BACKEND_PORT: ${{ secrets.BACKEND_PUBLISH_PORT || '2010' }}
      PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
    steps:
      - name: Preflight deploy configuration
        id: preflight
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          TARGET_PATH: ${{ secrets.TARGET_PATH }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OAUTH_REDIRECT_URIS: ${{ secrets.OAUTH_REDIRECT_URIS }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          EXPERT_HUB_SSO_URL: ${{ secrets.EXPERT_HUB_SSO_URL }}
          EXPERT_HUB_SSO_CLIENT_ID: ${{ secrets.EXPERT_HUB_SSO_CLIENT_ID }}
          EXPERT_HUB_SSO_CLIENT_SECRET: ${{ secrets.EXPERT_HUB_SSO_CLIENT_SECRET }}
          FRONTEND_REPOSITORY: ${{ secrets.FRONTEND_REPOSITORY }}
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          for name in HOST USERNAME SSH_KEY TARGET_PATH PUBLIC_URL DB_HOST DB_PORT DB_USER DB_PASSWORD DB_NAME JWT_SECRET OAUTH_REDIRECT_URIS CORS_ORIGINS EXPERT_HUB_SSO_URL EXPERT_HUB_SSO_CLIENT_ID EXPERT_HUB_SSO_CLIENT_SECRET; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              missing+=("$name")
            fi
          done

          if [ -n "${PUBLIC_URL:-}" ]; then
            case "$PUBLIC_URL" in
              https://*) ;;
              *) missing+=("PUBLIC_URL (must be https://)") ;;
            esac
          fi

          if [ -n "${DB_HOST:-}" ]; then
            case "$DB_HOST" in
              127.*|localhost|::1) missing+=("DB_HOST (must be reachable from Docker, not localhost)") ;;
            esac
          fi

          frontend_repo="${FRONTEND_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/mji-manager-frontend}"
          echo "frontend_repo=${frontend_repo}" >> "$GITHUB_OUTPUT"

          if [ ${#missing[@]} -gt 0 ]; then
            {
              echo "### Deploy skipped"
              echo "Missing repository secrets: ${missing[*]}"
              echo "Configure secrets listed in \`docs/DEPLOY.md\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped — missing secrets: ${missing[*]}"
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::Manual deploy requires all secrets from docs/DEPLOY.md."
              exit 1
            fi
            exit 0
          fi

          http_code="$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${frontend_repo}")"
          if [ "$http_code" != "200" ]; then
            {
              echo "### Deploy blocked"
              echo "Frontend repository \`${frontend_repo}\` is not accessible (HTTP ${http_code})."
              echo "Create \`mji-manager-frontend\` on GitHub or set \`FRONTEND_REPOSITORY\` / \`REPO_ACCESS_TOKEN\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::error::Frontend repo not accessible: ${frontend_repo} (HTTP ${http_code}). See docs/DEPLOY.md."
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout backend
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Checkout frontend
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.preflight.outputs.frontend_repo }}
          path: frontend
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pack sources for deploy
        if: steps.preflight.outputs.ready == 'true'
        run: |
          OUT="${RUNNER_TEMP}/deploy-src.zip"
          zip -rq "$OUT" . \
            -x '.git/*' \
            -x '.env' \
            -x '.env.*' \
            -x 'node_modules/*' \
            -x 'frontend/node_modules/*' \
            -x 'frontend/.next/*' \
            -x 'installer/*.exe' \
            -x '.github/*'
          cp "$OUT" deploy-src.zip

      - name: Verify server Docker
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          port: 2222
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 3m
          command_timeout: 60m
          script: |
            powershell -NoProfile -Command "Write-Host '=== Docker ==='; docker --version; $os=(docker info --format '{{.OSType}}' 2>$null).Trim(); if (-not $os) { Write-Error 'Cannot detect Docker OSType'; exit 1 }; Write-Host ('Engine: ' + $os); if ($os -ieq 'windows') { docker compose version 2>$null; if ($LASTEXITCODE -ne 0) { docker-compose --version } }"

      - name: Ensure target folders on server
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.0
        env:
          TARGET_PATH: ${{ secrets.TARGET_PATH }}
          INSTALLER_MOUNT: ${{ env.INSTALLER_MOUNT }}
          INSTALLER_RELEASES_MOUNT: ${{ env.INSTALLER_RELEASES_MOUNT }}
        with:
          host: ${{ secrets.HOST }}
          port: 2222
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 3m
          command_timeout: 60m
          envs: TARGET_PATH,INSTALLER_MOUNT,INSTALLER_RELEASES_MOUNT
          script: |
            powershell -NoProfile -Command "$ErrorActionPreference='Stop'; foreach ($p in @($env:TARGET_PATH, $env:INSTALLER_MOUNT, $env:INSTALLER_RELEASES_MOUNT)) { if ($p) { New-Item -ItemType Directory -Force -Path $p | Out-Null } }"

      - name: Clean target folder on server
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.0
        env:
          TARGET_PATH: ${{ secrets.TARGET_PATH }}
        with:
          host: ${{ secrets.HOST }}
          port: 2222
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 3m
          command_timeout: 60m
          envs: TARGET_PATH
          script: |
            powershell -NoProfile -Command "$p=$env:TARGET_PATH; $m=Join-Path $p '.mji-deploy-target'; if (Test-Path $p) { Get-ChildItem $p -Force | Where-Object { $_.Name -ne '.mji-deploy-target' } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue }; if (-not (Test-Path $m)) { Set-Content $m 'MJI Manager deploy target: prod' -Encoding utf8 }"

      - name: Copy source archive to server
        if: steps.preflight.outputs.ready == 'true'
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_DIR: ${{ secrets.TARGET_PATH }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_scp_key
          chmod 600 ~/.ssh/deploy_scp_key
          rd="${REMOTE_DIR//\\//}"
          rd="${rd%/}"
          dest="${rd}/deploy-src.zip"
          ps_path="${rd//\'/\'\'}"
          ssh -i ~/.ssh/deploy_scp_key -p 2222 -o ConnectTimeout=180 -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "powershell.exe -NoProfile -Command \"New-Item -ItemType Directory -Force -Path '${ps_path}' | Out-Null\""
          scp -i ~/.ssh/deploy_scp_key -P 2222 -o ConnectTimeout=180 -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            deploy-src.zip "${SSH_USER}@${SSH_HOST}:${dest}"
          shred -u ~/.ssh/deploy_scp_key 2>/dev/null || rm -f ~/.ssh/deploy_scp_key

      - name: Deploy stack on server
        if: steps.preflight.outputs.ready == 'true'
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_DIR: ${{ secrets.TARGET_PATH }}
          RUN_ID: ${{ github.run_id }}
          TARGET_PATH: ${{ secrets.TARGET_PATH }}
          BUILD_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          OAUTH_REDIRECT_URIS: ${{ secrets.OAUTH_REDIRECT_URIS }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          AUTH_COOKIE_SAMESITE: ${{ secrets.AUTH_COOKIE_SAMESITE }}
          AUTH_CROSS_ORIGIN_COOKIES: ${{ secrets.AUTH_CROSS_ORIGIN_COOKIES }}
          EXPERT_HUB_SSO_URL: ${{ secrets.EXPERT_HUB_SSO_URL }}
          EXPERT_HUB_SSO_CLIENT_ID: ${{ secrets.EXPERT_HUB_SSO_CLIENT_ID }}
          EXPERT_HUB_SSO_CLIENT_SECRET: ${{ secrets.EXPERT_HUB_SSO_CLIENT_SECRET }}
          EXPERT_HUB_FETCH_TIMEOUT_MS: ${{ secrets.EXPERT_HUB_FETCH_TIMEOUT_MS }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          INSTALLER_MOUNT: ${{ env.INSTALLER_MOUNT }}
          INSTALLER_RELEASES_MOUNT: ${{ env.INSTALLER_RELEASES_MOUNT }}
          BACKEND_PORT: ${{ env.BACKEND_PORT }}
          WEB_PORT: ${{ env.WEB_PORT }}
          WINDOWS_HOST_IP: ${{ secrets.WINDOWS_HOST_IP }}
          API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_EXPERT_HUB_SSO_URL: ${{ secrets.NEXT_PUBLIC_EXPERT_HUB_SSO_URL }}
          NEXT_PUBLIC_EXPERT_HUB_SSO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_EXPERT_HUB_SSO_CLIENT_ID }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_scp_key
          chmod 600 ~/.ssh/deploy_scp_key

          run_tag="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT:-1}"
          script_local="${RUNNER_TEMP}/mji-deploy-${run_tag}.ps1"
          config_local="${RUNNER_TEMP}/mji-deploy-${run_tag}.json"

          python3 - "$config_local" <<'PY'
          import json, os, sys
          keys = [
              'TARGET_PATH', 'RUN_ID', 'BUILD_SHA', 'COMPOSE_PROJECT',
              'DB_HOST', 'DB_PORT', 'DB_USER', 'DB_PASSWORD', 'DB_NAME',
              'JWT_SECRET', 'JWT_EXPIRES_IN', 'OAUTH_REDIRECT_URIS', 'CORS_ORIGINS',
              'AUTH_COOKIE_SAMESITE', 'AUTH_CROSS_ORIGIN_COOKIES',
              'EXPERT_HUB_SSO_URL', 'EXPERT_HUB_SSO_CLIENT_ID', 'EXPERT_HUB_SSO_CLIENT_SECRET',
              'EXPERT_HUB_FETCH_TIMEOUT_MS', 'PUBLIC_URL',
              'INSTALLER_HOST_PATH', 'INSTALLER_RELEASES_HOST_PATH',
              'BACKEND_PUBLISH_PORT', 'WEB_PUBLISH_PORT',
              'WINDOWS_HOST_IP', 'API_URL',
              'NEXT_PUBLIC_API_URL', 'NEXT_PUBLIC_EXPERT_HUB_SSO_URL', 'NEXT_PUBLIC_EXPERT_HUB_SSO_CLIENT_ID',
          ]
          config = {k: os.environ.get(k, '') for k in keys}
          config['TARGET_PATH'] = os.environ.get('REMOTE_DIR', '')
          config['RUN_ID'] = os.environ.get('RUN_ID', '')
          config['BUILD_SHA'] = os.environ.get('GITHUB_SHA', 'deploy')
          config['COMPOSE_PROJECT'] = 'mji-manager'
          config['INSTALLER_HOST_PATH'] = os.environ.get('INSTALLER_MOUNT', '')
          config['INSTALLER_RELEASES_HOST_PATH'] = os.environ.get('INSTALLER_RELEASES_MOUNT', '')
          config['BACKEND_PUBLISH_PORT'] = os.environ.get('BACKEND_PORT', '2010')
          config['WEB_PUBLISH_PORT'] = os.environ.get('WEB_PORT', '2020')
          required = [
              'TARGET_PATH', 'RUN_ID', 'PUBLIC_URL', 'DB_HOST', 'DB_USER', 'DB_PASSWORD', 'DB_NAME',
              'JWT_SECRET', 'OAUTH_REDIRECT_URIS', 'CORS_ORIGINS',
              'EXPERT_HUB_SSO_URL', 'EXPERT_HUB_SSO_CLIENT_ID', 'EXPERT_HUB_SSO_CLIENT_SECRET',
          ]
          missing = [k for k in required if not config.get(k)]
          if missing:
              print('::error::Missing deploy config: ' + ', '.join(missing), file=sys.stderr)
              raise SystemExit(1)
          with open(sys.argv[1], 'w', encoding='utf-8') as fh:
              json.dump(config, fh, ensure_ascii=False)
          PY

          rd="${REMOTE_DIR//\\//}"
          rd="${rd%/}"
          remote_script="${rd}/.mji-deploy-${run_tag}.ps1"
          remote_config="${rd}/.mji-deploy-${run_tag}.json"
          ps_path="${rd//\'/\'\'}"

          scp -i ~/.ssh/deploy_scp_key -P 2222 -o ConnectTimeout=180 -o StrictHostKeyChecking=accept-new \
            scripts/deploy/deploy-windows.ps1 "${SSH_USER}@${SSH_HOST}:${remote_script}"
          scp -i ~/.ssh/deploy_scp_key -P 2222 -o ConnectTimeout=180 -o StrictHostKeyChecking=accept-new \
            "$config_local" "${SSH_USER}@${SSH_HOST}:${remote_config}"

          ssh -i ~/.ssh/deploy_scp_key -p 2222 -o ConnectTimeout=180 -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            "${SSH_USER}@${SSH_HOST}" \
            "powershell.exe -NoProfile -ExecutionPolicy Bypass -File \"${remote_script}\" -ConfigPath \"${remote_config}\""

          ssh -i ~/.ssh/deploy_scp_key -p 2222 -o ConnectTimeout=180 -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "powershell.exe -NoProfile -Command \"Remove-Item -LiteralPath '${remote_script}','${remote_config}' -Force -ErrorAction SilentlyContinue\""

          shred -u ~/.ssh/deploy_scp_key "$config_local" 2>/dev/null || rm -f ~/.ssh/deploy_scp_key "$config_local"

      - name: Post-deploy diagnostics
        if: failure() && steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.0
        env:
          TARGET_PATH: ${{ secrets.TARGET_PATH }}
          RUN_ID: ${{ github.run_id }}
        with:
          host: ${{ secrets.HOST }}
          port: 2222
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 3m
          command_timeout: 60m
          envs: TARGET_PATH,RUN_ID
          script: |
            powershell -NoProfile -Command "$ErrorActionPreference='Continue'; Write-Host '=== docker ps ==='; docker ps -a --filter 'label=com.docker.compose.project=mji-manager' --format 'table {{.Names}}\t{{.Status}}'; Set-Location $env:TARGET_PATH; $m=Join-Path $env:TARGET_PATH '.mji-last-deploy.txt'; if (Test-Path $m) { Write-Host ('marker: ' + (Get-Content $m -Raw)) } else { Write-Error 'Deploy marker missing'; exit 1 }"
